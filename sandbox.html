<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTPL Comprehensive ERP</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #f0f4f9; font-family: "Google Sans", sans-serif; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; display: none; }
        .trip-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #dadce0; cursor: pointer; }
        .reco-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; margin-top: 10px; }
        .calc-danger { background: #fce8e6; color: #b3261e; font-weight: 800; padding: 10px; text-align: center; border-radius: 8px; margin-top: 10px; border: 1px solid #f9d0c4; }
        .btn { padding: 10px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div id="pin-overlay" style="position:fixed; inset:0; background:#f0f4f9; display:flex; justify-content:center; align-items:center;">
    <div class="trip-card" style="width:300px; text-align:center;">
        <h2>System Access</h2>
        <input type="password" id="app-pin" style="width:100%; padding:10px; border-radius:6px; border:1px solid #dadce0;" maxlength="4">
        <button class="btn" style="width:100%; margin-top:10px; background:#0b57d0; color:white;" onclick="checkPin()">Unlock</button>
    </div>
</div>

<div class="container" id="main-app">
    <div id="reco-container" class="list-container"></div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzc2y0Caupte-mahQ5R3Vlc--92gkvL-B_cc1tC37qyPDmNeWUaX44ufvZnxrdtR5W_AQ/exec";
    let allTrips = [], vehicles = {}, currentUser = {Name: "Admin", Role: "Master Admin"};

    async function checkPin() { 
        if(document.getElementById('app-pin').value === "1234") { 
            document.getElementById('pin-overlay').style.display='none'; 
            document.getElementById('main-app').style.display='block'; 
            await performDatabaseSync(); 
        } 
    }

    async function performDatabaseSync() { 
        const res = await fetch(GOOGLE_SCRIPT_URL); 
        const data = await res.json(); 
        allTrips = data.trips || []; vehicles = data.vehicles || {}; 
        renderReconciliation(); 
    }

    function renderReconciliation() {
        const container = document.getElementById('reco-container');
        container.innerHTML = allTrips.map(t => {
            let ledger = { income: [], expense: [], reco: {} };
            try { ledger = JSON.parse(t.financialLedger); } catch(e){}
            
            let baseRev = parseFloat(t.cFreight || 0), extraRev = (ledger.income || []).reduce((s, r) => s + r.amt, 0);
            let baseCost = parseFloat(t.vFreight || 0), extraCost = (ledger.expense || []).reduce((s, r) => s + r.amt, 0);
            let totalPayable = baseCost + extraCost;
            let totalReceivable = baseRev + extraRev;
            let isOwn = !vehicles[(t.vNum || '').toUpperCase()];

            // Math Logic
            let adv = parseFloat(ledger.reco.adv || 0); let bal = parseFloat(ledger.reco.bal || 0);
            let finalDue = isOwn ? (totalPayable - totalReceivable - adv - bal) : (totalReceivable - totalPayable - adv - bal);

            return `
            <div class="trip-card">
                <div onclick="document.getElementById('body-${t.id}').style.display = document.getElementById('body-${t.id}').style.display==='block'?'none':'block'">
                    <strong>${(t.date||'').split(',')[0]}</strong> | ${t.vNum} | ${t.from}➔${t.to} <br>
                    ${isOwn ? `Party: ${t.party} | Transporter: ${t.tName}` : `Broker: ${t.brokingAgent}`}
                </div>
                <div id="body-${t.id}" style="display:none;">
                    <div class="reco-split">
                        <div>
                            <strong>Receivables</strong>
                            ${(ledger.income||[]).map(x=>`<div>${x.type}: ₹${x.amt}</div>`).join('')}
                            <div style="font-weight:800;">Total: ₹${totalReceivable}</div>
                        </div>
                        <div>
                            <strong>Payables</strong>
                            ${(ledger.expense||[]).map(x=>`<div>${x.type}: ₹${x.amt}</div>`).join('')}
                            <div style="font-weight:800;">Total: ₹${totalPayable}</div>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                        <input type="number" class="compact-input" placeholder="Adv Paid" id="adv-${t.id}">
                        <input type="date" class="compact-input">
                        <input type="number" class="compact-input" placeholder="Bal Paid" id="bal-${t.id}">
                        <input type="date" class="compact-input">
                    </div>
                    <div class="calc-danger">${isOwn ? 'Balance to Pay: ₹' : 'Outstanding Amount: ₹'}${finalDue}</div>
                    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="saveReco('${t.id}')">Save Status</button>
                </div>
            </div>`;
        }).join('');
    }

    function saveReco(id) { 
        alert("Status Saved. Staying on page."); 
    }
</script>
</body>
</html>
