    function getZoneForCity(city) {
        if (!city) return null; 
        let c = city.trim().toLowerCase().replace(/\s+(mh|up|gj|dl|hr|pb|wb|or|ka|ts|tn|rj)$/i, '');
        for (let zone in ZONES) { 
            if (ZONES[zone].some(zc => c.includes(zc.toLowerCase()))) return zone; 
        } 
        return null;
    }

    function getSafeTel(numStr) { 
        if (!numStr) return ''; 
        let c = String(numStr).replace(/[\s-]/g, '').trim(); 
        if (c.startsWith('+')) return c; 
        if (c.startsWith('91') && c.length > 10) return '+' + c; 
        return '+91' + c; 
    }

    function formatCaseStr(str) {
        if (!str) return "";
        return str.trim().split(/\s+/).map(w => {
            let cw = w.replace(/[^A-Za-z0-9]/g, ''); 
            if (cw.length > 0 && cw.length <= 3) return w.toUpperCase();
            
            let i = w.search(/[a-zA-Z]/); 
            if (i !== -1) {
                return w.substring(0, i) + w.charAt(i).toUpperCase() + w.substring(i+1).toLowerCase(); 
            }
            return w;
        }).join(' ');
    }

    function formatCase(el, style) { 
        if (el.value) {
            el.value = style === 'upper' ? el.value.trim().toUpperCase() : formatCaseStr(el.value); 
        }
    }

    function formatSentence(el) { 
        if (el.value) {
            el.value = el.value.trim().charAt(0).toUpperCase() + el.value.trim().slice(1); 
        }
    }

    function formatVehicleNumber(el) { 
        if (el.value) {
            el.value = el.value.toUpperCase().replace(/[\s-_]/g, ''); 
        }
    }

    function formatPhoneString(nStr) { 
        if (!nStr) return ""; 
        let c = nStr.replace(/[\s-]/g, '').trim(); 
        if (c.startsWith("+91")) return c; 
        else if (c.startsWith("91") && c.length > 10) return "+" + c; 
        else return "+91" + c; 
    }

    function formatPhoneInput(el) { 
        el.value = formatPhoneString(el.value); 
    }

    function getFormattedDateVal(dVal) { 
        if (!dVal) return ""; 
        const d = new Date(dVal); 
        const dy = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; 
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}, ${dy[d.getDay()]}`; 
    }

    function parseDate(dStr) { 
        if (!dStr) return 0; 
        try { 
            let p = dStr.split(',')[0].split('/'); 
            if (p.length === 3) return new Date(p[2], p[1]-1, p[0]).getTime(); 
            return 0; 
        } catch(e) { 
            return 0; 
        } 
    }

    function isVehicleNumber(str) { 
        if (!str) return false; 
        return /^[A-Z]{2}\d{1,2}[A-Z]{0,3}\d{4}$/.test(str.replace(/[\s-_]/g, '').toUpperCase()); 
    }

    function isKTPL(vNum) { 
        if (!vNum || !vehicles[vNum.toUpperCase()]) return false; 
        let tr = vehicles[vNum.toUpperCase()].transporter; 
        return tr && String(tr).trim().toUpperCase() === 'KTPL'; 
    }
    
    function normalizePartyName(name) {
        if (!name) return ""; 
        let o = name.trim(); 
        let l = o.toLowerCase();
        
        if (/(^|\s)usv(\s|$)/.test(l) || l.startsWith('usv')) return 'USV'; 
        if (/(^|\s)nrb(\s|$)/.test(l) || l.startsWith('nrb')) return 'NRB';
        if (/(^|\s)j\.?b\.?\s*chemical/.test(l) || l.startsWith('jb ')) return 'JB Chemicals'; 
        if (/(^|\s)r\.?k\.?\s*foodland/.test(l) || l.startsWith('rk ')) return 'RK Foodland';
        if (/(^|\s)tech\s*nova/.test(l) || l.startsWith('technova') || l.startsWith('tech nova')) return 'Tech Nova';
        if (/(^|\s)vns(\s|$)/.test(l) || l.startsWith('vns')) return 'VNS'; 
        if (/(^|\s)jnpt(\s|$)/.test(l) || l.startsWith('jnpt')) return 'JNPT';
        
        if (l.startsWith('fr8') || l.startsWith('fr 8')) { 
            let r = o.replace(/^fr[\s-]*8/i, '').trim(); 
            if (r.startsWith('-')) r = r.substring(1).trim(); 
            return r ? 'FR8 - ' + formatCaseStr(r) : 'FR8'; 
        }
        
        if (l.startsWith('lobb')) { 
            let r = o.replace(/^lobb/i, '').trim(); 
            if (r.startsWith('-')) r = r.substring(1).trim(); 
            return r ? 'Lobb - ' + formatCaseStr(r) : 'Lobb'; 
        }
        
        return formatCaseStr(o);
    }
    
    function formatPartyName(el) { 
        if (el && el.value) {
            el.value = normalizePartyName(el.value); 
        }
    }

    function blockVehicleInPartyFields(mode) {

    function executeWhatsAppShare(appType) {
        const enc = encodeURIComponent(pendingWhatsAppMsg); 
        const ua = navigator.userAgent || navigator.vendor || window.opera; 
        let url = "";
        
        if (/android/i.test(ua)) { 
            url = appType === 'business' ? `intent://send?text=${enc}#Intent;package=com.whatsapp.w4b;scheme=whatsapp;end` : `intent://send?text=${enc}#Intent;package=com.whatsapp;scheme=whatsapp;end`; 
            window.location.href = url; 
        } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) { 
            url = `whatsapp://send?text=${enc}`; 
            window.location.href = url; 
        } else { 
            url = `whatsapp://send?text=${enc}`; 
            window.open(url, '_blank'); 
        } 
        closeWhatsAppChoiceModal();
    }

    async function checkPin() {
        if (isCheckingPin) return; 
        
        const pInput = document.getElementById('app-pin'); 
        const pin = pInput ? pInput.value.trim() : ''; 
        
        if (!pin) return; 
        if (pin.length !== 4) { 
            document.getElementById('pin-error').innerText = "Enter 4-digit PIN."; 
            document.getElementById('pin-error').style.display = 'block'; 
            return; 
        }
        
        isCheckingPin = true; 
        document.getElementById('pin-error').style.display = 'none'; 
        document.getElementById('pin-overlay').style.display = 'none'; 
        document.getElementById('loading-overlay').style.display = 'flex'; 
        document.getElementById('loader-text').innerText = "Verifying & Syncing Databank...";
        
        try {
            await performDatabaseSync(); 
            const u = users.find(x => x && String(x.PIN || x.pin) === String(pin)) || (pin === "1234" ? {Name: "Master Admin", Role: "Master Admin"} : null);
            
            if (u) { 
                currentUser = u; 
                sessionStorage.setItem('ktpl_unlocked', 'true'); 
                sessionStorage.setItem('ktpl_user', JSON.stringify(u)); 
                document.getElementById('loading-overlay').style.display = 'none'; 
                applyUserPermissions(); 
            } else { 
                document.getElementById('loading-overlay').style.display = 'none'; 
                document.getElementById('pin-overlay').style.display = 'flex'; 
                document.getElementById('pin-error').innerText = "Invalid PIN."; 
                document.getElementById('pin-error').style.display = 'block'; 
                if (pInput) pInput.value = ''; 
            }
        } catch (err) { 
            document.getElementById('loader-text').innerText = "Sync Failed."; 
            document.getElementById('error-box').innerText = err.message; 
            document.getElementById('error-box').style.display = "block"; 
            document.getElementById('bypass-btn').style.display = "inline-block"; 
        }
        isCheckingPin = false;
    }
    
    async function performDatabaseSync() {
        const ts = Date.now(); 
        const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + ts); 
        
        if (!res.ok) throw new Error("Connection failed."); 
        
        const data = await res.json();
        vehicles = data.vehicles || {}; 
        clients = data.clients || []; 
        transporters = data.transporters || {}; 
        users = data.users || []; 
        statusLogs = data.statusLogs || []; 
        
        let cU = users.find(u => (u.Name || u.name) === '__VCONFIG__'); 
        if (cU) { 
            try { 
                vehicleBranches = JSON.parse(cU.Role || cU.role); 
                localStorage.setItem('ktpl_branches', JSON.stringify(vehicleBranches)); 
            } catch(e){} 
        }
        
        const revLogIds = [
            'TRP-1779115155932','TRP-1779117724465','TRP-1779204199291',
            'TRP-1779272619346','TRP-1779375136137','TRP-1779457814247',
            'TRP-1779638743270','TRP-1779686779691','TRP-1779722314454'
        ];
        
        allTrips = (data.trips || []).map(t => {
            t.bookingType = 'Own Booking'; 
            t.brokingAgent = '';
            
            if (t.financialLedger) { 
                try { 
                    let j = JSON.parse(t.financialLedger); 
                    if(j.bookingType) t.bookingType = j.bookingType; 
                    if(j.brokingAgent) t.brokingAgent = j.brokingAgent; 
                } catch(e){} 
            }
            
            if (!t.bookingType || t.bookingType === 'Own Booking') { 
                if (t.brokingAgent) { 
                    t.bookingType = 'Reverse Logistics'; 
                    t.tName = ''; 
                } 
            }
            
            if (revLogIds.includes(t.id)) {
                t.bookingType = 'Reverse Logistics';
            }
            
            t.computedBookingType = t.bookingType; 
            return t;
        });
        
        setupMemoryDropdowns(); 
        renderAdminUsers();
    }

    function setupCustomDropdown(inpId, lstId, fn, onSel=null) {
        const inp = document.getElementById(inpId); 
        const lst = document.getElementById(lstId); 
        if (!inp || !lst) return;
        
        function showL(text = "") {
            const arr = fn(); 
            lst.innerHTML = ""; 
            let has = false;
            
            arr.forEach(i => { 
                if (!i) return; 
                if (!text || String(i).toLowerCase().includes(text.toLowerCase())) {
                    has = true; 
                    let div = document.createElement("div"); 
                    div.innerHTML = i; 
                    
                    div.onclick = function() { 
                        inp.value = i; 
                        lst.style.display = "none"; 
                        if (['ob-party','ob-tname','rl-party','rl-agency','edit-party','mis-party','rf-party','uf-party','uf-transporter'].includes(inp.id)) {
                            formatPartyName(inp); 
                        } else {
                            formatCase(inp, 'title'); 
                        }
                        
                        if (onSel) onSel(i); 
                        
                        if (inp.id.startsWith('uf-')) triggerFilterRender(); 
                    };
                    lst.appendChild(div); 
                }
            }); 
            lst.style.display = has ? "block" : "none";
        }
        
        inp.addEventListener("input", function() { showL(this.value); }); 
        inp.addEventListener("click", function() { showL(this.value); }); 
        document.addEventListener("click", function (e) { if (e.target !== inp) lst.style.display = "none"; });
    }

        };

        setupCustomDropdown('uf-transporter', 'uf-transporter-list', () => [...new Set([...Object.keys(transporters).map(normalizePartyName), ...allTrips.map(t=>t?normalizePartyName(t.brokingAgent):'').filter(Boolean)])].sort(), () => triggerFilterRender()); 
        setupCustomDropdown('uf-vnum', 'uf-vnum-list', () => Object.keys(vehicles).sort(), () => triggerFilterRender()); 
        setupCustomDropdown('uf-origin', 'uf-origin-list', () => [...new Set(allTrips.map(t => t?t.from:'').filter(Boolean))].sort(), () => triggerFilterRender()); 
        setupCustomDropdown('uf-dest', 'uf-dest-list', () => [...new Set(allTrips.map(t => t?t.to:'').filter(Boolean))].sort(), () => triggerFilterRender()); 
        setupCustomDropdown('uf-vtype', 'uf-vtype-list', () => [...new Set(allTrips.map(t => t?t.type:'').filter(Boolean))].sort(), () => triggerFilterRender());
        
        setupCustomDropdown('ob-party', 'ob-party-list', () => [...new Set(clients.map(getCN).filter(Boolean))].sort()); 
        setupCustomDropdown('ob-vnum', 'ob-vnum-list', () => Object.keys(vehicles).sort(), (v) => autoFillVehicle(v, 'ob')); 
        setupCustomDropdown('ob-tname', 'ob-tname-list', () => Object.keys(transporters).map(normalizePartyName).sort());
        
        setupCustomDropdown('ob-tperson', 'ob-tperson-list', () => { 
            let mk = Object.keys(transporters).find(k => normalizePartyName(k) === normalizePartyName(document.getElementById('ob-tname').value)); 
            let lst = transporters[mk || document.getElementById('ob-tname').value]; 
            return lst ? lst.map(p => p.name).sort() : []; 
        }, (p) => autoFillContact(p, 'ob'));
        
        setupCustomDropdown('ob-from', 'ob-from-list', () => [...new Set(allTrips.map(t => t?t.from:'').filter(Boolean))].sort()); 
        setupCustomDropdown('ob-to', 'ob-to-list', () => [...new Set(allTrips.map(t => t?t.to:'').filter(Boolean))].sort());

        setupCustomDropdown('rl-vnum', 'rl-vnum-list', () => Object.keys(vehicles).sort(), (v) => autoFillVehicle(v, 'rl'));

        setupCustomDropdown('rl-to', 'rl-to-list', () => [...new Set(allTrips.map(t => t?t.to:'').filter(Boolean))].sort()); 
        setupCustomDropdown('rl-agent', 'rl-agent-list', () => [...new Set(clients.map(getCN).filter(Boolean))].sort()); 
        setupCustomDropdown('mis-party', 'mis-party-list', () => [...new Set(clients.map(getCN).filter(Boolean))].sort()); 
        setupCustomDropdown('rf-party', 'rf-party-list', () => [...new Set(clients.map(getCN).filter(Boolean))].sort());
        setupCustomDropdown('loc-origin', 'loc-origin-list', () => [...new Set(allTrips.map(t => t?t.from:'').filter(Boolean))].sort()); 
        setupCustomDropdown('loc-dest', 'loc-dest-list', () => [...new Set(allTrips.map(t => t?t.to:'').filter(Boolean))].sort()); 
        setupCustomDropdown('loc-vtype', 'loc-vtype-list', () => [...new Set(allTrips.map(t => t?t.type:'').filter(Boolean))].sort()); 
        setupCustomDropdown('loc-vcap', 'loc-vcap-list', () => [...new Set(allTrips.map(t => t?t.weight:'').filter(Boolean))].sort());
        
        allTrips.forEach(t => { 
            if (t && t.dName && typeof t.dName === 'string' && t.dName.trim() !== "" && t.dContact) {
                driverData[formatCaseStr(t.dName)] = String(t.dContact).trim(); 
            }
        });
        
        setupCustomDropdown('ob-dname', 'ob-dname-list', () => Object.keys(driverData).sort(), (n) => { document.getElementById('ob-dcontact').value = driverData[n] || ""; }); 
        setupCustomDropdown('rl-dname', 'rl-dname-list', () => Object.keys(driverData).sort(), (n) => { document.getElementById('rl-dcontact').value = driverData[n] || ""; });
        
        const dNums = [...new Set(Object.values(driverData))];
        
        ['ob-dcontact', 'rl-dcontact'].forEach(id => { 
            const inp = document.getElementById(id); 
            const lst = document.getElementById(id + '-list'); 
            if (inp && lst) { 
                inp.addEventListener("input", function() { 
                    lst.innerHTML = ""; 
                    if (this.value.length > 2) { 
                        let c = this.value.replace(/[\s-]/g, '').trim(); 
                        const matches = dNums.filter(n => String(n).includes(c)); 
                        matches.forEach(m => { 
                            let div = document.createElement("div"); 
                            div.innerHTML = m; 
                            div.onclick = () => { inp.value = m; lst.style.display = "none"; }; 
                            lst.appendChild(div); 
                        }); 
                        lst.style.display = matches.length ? "block" : "none"; 
                    } else { 
                        lst.style.display = "none"; 
                    } 
                }); 
            } 
        });
    }

    function updateLocalMemory(td) {
        if (td.vNum && td.vType) { 
            if(!vehicles[td.vNum.toUpperCase()]) vehicles[td.vNum.toUpperCase()]={}; 
            vehicles[td.vNum.toUpperCase()].type = td.vType; 
            vehicles[td.vNum.toUpperCase()].capacity = td.weight; 
        }
        
        const checkC = (n) => { 
            if(!n) return; 
            let nk = normalizePartyName(n); 
            let exists = clients.some(c => { 
                let cStr = typeof c === 'string' ? c : (c.name || c['Party Name'] || c.Name || Object.values(c)[0] || ""); 
                return cStr.toLowerCase() === nk.toLowerCase(); 
            }); 
            if(!exists) clients.push({name: nk}); 
        };
        
        checkC(td.party); 
        checkC(td.brokingAgent); 
        checkC(td.tName);
        
        if (td.dName && td.dContact) driverData[formatCaseStr(td.dName)] = td.dContact;
        
        let tn = normalizePartyName(td.tName || td.brokingAgent);
        if (tn) { 
            if (!transporters[tn]) transporters[tn] = []; 
            if (td.tPerson) { 
                let pn = formatCaseStr(td.tPerson); 
                let ex = transporters[tn].find(p => p.name.toLowerCase() === pn.toLowerCase()); 
                if (!ex) { 
                    transporters[tn].push({ name: pn, phone: td.tContact || "" }); 
                } else if(td.tContact && !ex.phone) { 
                    ex.phone = td.tContact; 
                } 
            } 
        }
        setupMemoryDropdowns(); 
    }

    function getFilteredTrips(base) {
        let r = [...base]; 
        const role = currentUser.Role || currentUser.role; 
        
        if (role === 'SelfOnly') r = r.filter(t => t.createdBy === (currentUser.Name || currentUser.name));
        
        const sDStr = document.getElementById('uf-start') ? document.getElementById('uf-start').value : ''; 
        const eDStr = document.getElementById('uf-end') ? document.getElementById('uf-end').value : '';
        const vM = document.getElementById('uf-vnum') ? document.getElementById('uf-vnum').value.trim().toLowerCase() : ''; 
        const vtM = document.getElementById('uf-vtype') ? document.getElementById('uf-vtype').value.trim().toLowerCase() : ''; 
        const vcM = document.getElementById('uf-vcap') ? document.getElementById('uf-vcap').value.trim().toLowerCase() : ''; 
        const pM = document.getElementById('uf-party') ? document.getElementById('uf-party').value.trim().toLowerCase() : ''; 
        const tM = document.getElementById('uf-transporter') ? document.getElementById('uf-transporter').value.trim().toLowerCase() : ''; 
        const oM = document.getElementById('uf-origin') ? document.getElementById('uf-origin').value.trim().toLowerCase() : ''; 
        const dM = document.getElementById('uf-dest') ? document.getElementById('uf-dest').value.trim().toLowerCase() : '';
        
        let sDate = sDStr ? new Date(sDStr) : null; 
        if(sDate) sDate.setHours(0,0,0,0); 
        
        let eDate = eDStr ? new Date(eDStr) : null; 
        if(eDate) eDate.setHours(23,59,59,999);
        
        r = r.filter(t => {
            let pD = true; 
            if (sDate || eDate) { 
                const pts = t.date ? (t.date || '').split(',')[0].split('/') : []; 
                if (pts.length === 3) { 
                    const tT = new Date(pts[2], pts[1]-1, pts[0]).getTime(); 
                    if (sDate && tT < sDate.getTime()) pD = false; 
                    if (eDate && tT > eDate.getTime()) pD = false; 
                } 
            }
            return pD && 
                   (!vM || (t.vNum || '').toLowerCase().includes(vM)) && 
                   (!vtM || (t.type || '').toLowerCase().includes(vtM)) && 
                   (!vcM || (t.weight || '').toLowerCase().includes(vcM)) && 
                   (!pM || (t.party || '').toLowerCase().includes(pM)) && 
                   (!tM || (t.tName || '').toLowerCase().includes(tM) || (t.brokingAgent || '').toLowerCase().includes(tM)) && 
                   (!oM || (t.from || '').toLowerCase().includes(oM)) && 
                   (!dM || (t.to || '').toLowerCase().includes(dM));
        });
        r.sort((a, b) => new Date((b.date||'').split(',')[0].split('/').reverse().join('-')) - new Date((a.date||'').split(',')[0].split('/').reverse().join('-'))); 
        return r;
    }

    function executeLocatorSearch() {
        const c = document.getElementById('locator-results'); 
        const orig = document.getElementById('loc-origin').value.trim(); 
        const dest = document.getElementById('loc-dest').value.trim(); 
        const vt = document.getElementById('loc-vtype').value.trim().toLowerCase(); 
        const vc = document.getElementById('loc-vcap').value.trim().toLowerCase();
        
        if(!orig && !dest && !vt && !vc) return alert("Enter at least one criteria to search.");
        
        const tZone = getZoneForCity(orig); 
        let r = []; 
        const n = currentUser.Name || currentUser.name || '';
        
        Object.keys(vehicles).forEach(vn => {
            if(!isKTPL(vn)) return; 
            
            let vd = vehicles[vn]; 
            let vdt = (vd.type||'').toLowerCase(); 
            let vdc = (vd.capacity||'').toLowerCase();
            
            if (n === 'Pramod Nayak' && !vdt.includes('32')) return;
            if (vt && !vdt.includes(vt)) return; 
            if (vc && !vdc.includes(vc)) return;
            
            let trs = allTrips.filter(t => (t.vNum||'').toUpperCase() === vn.toUpperCase()); 
            let aTr = trs.find(t => (t.status||'').trim() === 'In-Transit'); 
            let st = aTr ? 'In Transit' : (vd.fleetStatus || 'Available (Idle)');
            
            let cT = trs.filter(t => (t.status||'').trim() === 'Delivered'); 
            cT.sort((a,b) => parseDate(b.deliveryDate||b.date) - parseDate(a.deliveryDate||a.date)); 
            let lTr = cT[0] || null;
            
            let locCity = 'Unknown'; 
            if (aTr) locCity = aTr.to || locCity; 
            else if (lTr) locCity = lTr.to || locCity;
            
            let match = false;
            if (tZone) { 
                if (getZoneForCity(locCity) === tZone) match = true; 
            } else if (orig) { 
                if (locCity.toLowerCase().includes(orig.toLowerCase())) match = true; 
            } else { 
                match = true; 
            }
            
            if (dest && aTr && !(aTr.to||'').toLowerCase().includes(dest.toLowerCase())) match = false;
            
            if (match) {
                r.push({ vNum: vn, type: vd.type||'-', cap: vd.capacity||'-', status: st, loc: locCity, currLoc: aTr?aTr.statusNote:'' });
            }
        });
        
        if (r.length === 0) { 
            c.innerHTML = `<div style="text-align:center; color:#5f6368; padding:20px; background:#fff; border-radius:12px; margin-top:20px;">No KTPL assets found matching proximity zone/criteria.</div>`; 
            return; 
        }
        
        c.innerHTML = `<h4 style="margin-top:20px; color:#1f1f1f;">${r.length} Asset(s) Found ${tZone ? `in ${tZone}` : ''}</h4>` + r.map(v => {
            let sc = "#5f6368"; 
            let bg = "#f1f3f4"; 
            if (v.status === 'In Transit') { sc = "#b06000"; bg = "#fef7e0"; } 
            else if (v.status === 'Available (Idle)') { sc = "#137333"; bg = "#e6f4ea"; } 
            else if (v.status === 'In Workshop') { sc = "#b3261e"; bg = "#fce8e6"; }
            
            return `
            <div class="trip-card" style="margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f1f3f4; padding-bottom:8px; margin-bottom:8px;">
                    <span style="font-weight:bold; font-size:14px;">${v.vNum}</span>
                    <span class="status-badge" style="background:${bg}; color:${sc};">${v.status}</span>
                </div>
                <div class="grid-2">
                    <div>
                        <span style="color:#5f6368; font-size:10px;">ZONE/CITY</span><br>
                        <strong>📍 ${v.loc}</strong>
                    </div>
                    <div>
                        <span style="color:#5f6368; font-size:10px;">SPECS</span><br>
                        <strong>🚚 ${v.type} (${v.cap})</strong>
                    </div>
                </div>
                ${v.currLoc ? `<div style="margin-top:6px; font-size:11px; color:#5f6368;">Current: ${v.currLoc}</div>` : ''}
            </div>`;
        }).join('');
    }

    function renderFleetStatus() {
        const c = document.getElementById('fleet-container'); 
        let lst = []; 
        const isAdm = getUserPerms().adminTab; 
        const n = currentUser.Name || currentUser.name || '';
        
        const fVnum = document.getElementById('fs-filter-vnum') ? document.getElementById('fs-filter-vnum').value.trim().toLowerCase() : '';
        const fType = document.getElementById('fs-filter-type') ? document.getElementById('fs-filter-type').value.trim().toLowerCase() : '';
        
        let idleLocs = JSON.parse(localStorage.getItem('ktpl_idle_locs') || '{}');

        Object.keys(vehicles).forEach(vn => {
            if(!isKTPL(vn)) return;
            
            let vd = vehicles[vn]; 
            let vt = (vd.type || '').toUpperCase(); 
            let vc = (vd.capacity || '').toUpperCase();
            
            let cat = 'Other Fleet'; 
            if (vt.includes('20')) cat = '20Ft Fleet'; 
            else if (vt.includes('32')) cat = '32Ft Fleet';
            
            if (n === 'Pramod Nayak' && !vt.includes('32')) return;
            if (currentFleetSecondary !== cat) return; 
            
            let vBr = vehicleBranches[vn.toUpperCase()] || 'Unassigned'; 
            if (currentFleetBranch !== 'All' && vBr !== currentFleetBranch) return;

            if (fVnum && !vn.toLowerCase().includes(fVnum)) return;
            if (fType && !vt.toLowerCase().includes(fType) && !vc.toLowerCase().includes(fType)) return;

            let vTr = allTrips.filter(t => (t.vNum || '').toUpperCase() === vn.toUpperCase()); 
            let aTr = vTr.find(t => (t.status || '').trim() === 'In-Transit'); 
            let stat = aTr ? 'In Transit' : (vd.fleetStatus || 'Available (Idle)');
            
            if (currentFleetPrimary !== 'All' && stat !== currentFleetPrimary) return;
            
            let cpTr = vTr.filter(t => (t.status || '').trim() === 'Delivered'); 
            cpTr.sort((a,b) => parseDate(b.deliveryDate || b.date) - parseDate(a.deliveryDate || a.date)); 
            let lTr = cpTr[0] || null;
            
            let loc = 'Blank (No completed trips)'; 
            if (aTr) {
                loc = aTr.statusNote || aTr.to || loc; 
            } else if (lTr) {
                loc = lTr.statusNote || lTr.to || loc;
            } else if (idleLocs[vn.toUpperCase()]) {
                loc = idleLocs[vn.toUpperCase()];
            }
            
            lst.push({ 
                vNum: vn, 
                type: vd.type || 'Unknown', 
                capacity: vd.capacity || '0', 
                status: stat, 
                location: loc, 
                driverName: lTr ? lTr.dName : 'N/A', 
                driverPhone: lTr ? lTr.dContact : 'N/A', 
                deliveryDate: lTr ? (lTr.deliveryDate || lTr.date) : null, 
                activeDate: aTr ? aTr.date : null, 
                statusTimestamp: vd.statusTimestamp, 
                branch: vBr,
                lastTripId: lTr ? lTr.id : null
            });
        });
        
        if (lst.length === 0) { 
            c.innerHTML = `<p style='padding:20px; color:#5f6368; text-align:center;'>No KTPL vehicles found matching filters.</p>`; 
            return; 
        }
        
        lst.sort((a, b) => (parseFloat(a.capacity.replace(/[^0-9.]/g,''))||0) - (parseFloat(b.capacity.replace(/[^0-9.]/g,''))||0));
        
        c.innerHTML = lst.map(v => {
            let sc = "#5f6368"; 
            let bg = "#f1f3f4"; 
            if (v.status === 'In Transit') { sc = "#b06000"; bg = "#fef7e0"; } 
            else if (v.status === 'Available (Idle)') { sc = "#137333"; bg = "#e6f4ea"; } 
            else if (v.status === 'In Workshop') { sc = "#b3261e"; bg = "#fce8e6"; } 
            else if (v.status === 'No Driver') { sc = "#5f6368"; bg = "#e8f0fe"; }
            
            let dur = ""; 
            if (v.status === 'In Transit' && v.activeDate) { 
                let d = parseDate(v.activeDate); 
                if (d>0) { 
                    let diff = Date.now() - d; 
                    let dys = Math.floor(diff/86400000); 
                    dur = dys>0 ? ` - ${dys}d` : ` - <1d`; 
                } 
            } else if (v.status === 'Available (Idle)' && v.deliveryDate) { 
                let d = parseDate(v.deliveryDate); 
                if (d>0) { 
                    let diff = Date.now() - d; 
                    let dys = Math.floor(diff/86400000); 
                    let hrs = Math.floor((diff/3600000)%24); 
                    dur = dys>0 ? ` - ${dys}d ${hrs}h` : ` - ${hrs}h`; 
                } 
            } else if ((v.status === 'In Workshop' || v.status === 'No Driver') && v.statusTimestamp) { 
                let diff = Date.now() - v.statusTimestamp; 
                if (diff>0) { 
                    let dys = Math.floor(diff/86400000); 
                    let hrs = Math.floor((diff/3600000)%24); 
                    dur = dys>0 ? ` - ${dys}d ${hrs}h` : ` - ${hrs}h`; 
                } 
            }
            
            let locationHTML = '';
            if (v.status !== 'In Transit') {
                let locValue = v.location === 'Blank (No completed trips)' ? '' : v.location;
                locationHTML = `<input type="text" class="compact-input" value="${locValue}" placeholder="Enter Current Location..." onchange="updateIdleLocation('${v.vNum}', this.value, '${v.lastTripId}')" style="margin-top:4px;">`;
            } else {
                locationHTML = `<strong style="font-size:12px; display:inline-block; margin-top:4px;">📍 ${v.location}</strong>`;
            }
            
            let h = `
            <div class="trip-card">
                <div style="border-bottom: 1px solid #f1f3f4; padding-bottom: 8px; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:14px; color:#1f1f1f;">${v.vNum}</span>
                    <span class="status-badge" style="background:${bg}; color:${sc};">${v.status}${dur}</span>
                </div>
                <div class="grid-2" style="margin-bottom: 10px;">
                    <div>
                        <span style="color:#5f6368; font-size:10px; text-transform:uppercase;">Current Location</span><br>
                        ${locationHTML}

    function validatePlacementOwn() {
        document.querySelectorAll('.error-msg').forEach(msg => msg.style.display = 'none'); 
        document.querySelectorAll('input').forEach(input => input.style.borderColor = 'transparent'); 
        
        if (blockVehicleInPartyFields('Own Booking')) return false;
        
        const pAuth = getUserPerms();
        if (!pAuth.adminTab) { 
            let pName = document.getElementById('ob-party').value.trim().toLowerCase(); 
            if (pName !== "") { 
                let exists = clients.some(c => { 
                    let cStr = typeof c === 'string' ? c : (c.name || c['Party Name'] || c.Name || Object.values(c)[0] || ""); 
                    return cStr.toLowerCase() === pName; 
                }); 
                if (!exists) { 
                    alert("Only Admins can add a new Party Name. Please select an existing party from the dropdown."); 
                    return false; 
                } 
            } 
        }
        
        let valid = true; 
        ['ob-date','ob-party','ob-from','ob-to','ob-vnum','ob-vtype','ob-weight','ob-dcontact','ob-tname','ob-tcontact'].forEach(id => { 
            const el = document.getElementById(id); 
            if (el && !el.value.trim()) { el.style.borderColor = '#b3261e'; valid = false; }
        }); 
        
        if (!valid) alert("Fill mandatory fields (*)."); 
        return valid; 
    }

        }); 
        p.financialLedger = ledg;
        
        const dR = [ 
            p.id, p.date, p.party, p.from, p.to, p.vNum, p.vType, p.weight, 
            "In-Transit", "", "", "", "", p.createdBy, p.vFreight, p.cFreight, 
            p.dName, p.dContact, p.tName, p.tPerson, p.tContact, p.remarks, 
            "", "", "", "", "", ledg

        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'saveTrip', data: dR, ...p }) });

        </div>`;

    window.calcRecoUI = function(tid, type) {
        let t = allTrips.find(x => x.id === tid); 
        if(!t) return;
        
        let l = { income: [], expense: [] }; 
        try { 
            let p = JSON.parse(t.financialLedger); 
            if(p.income) l.income = p.income; 
            if(p.expense) l.expense = p.expense; 
        } catch(e){}
        
        let bC = parseFloat(t.vFreight || 0); 
        let eC = l.expense.reduce((s, r) => s + parseFloat(r.amt||0), 0); 
        
        let bR = parseFloat(t.cFreight || 0); 
        let eR = l.income.reduce((s, r) => s + parseFloat(r.amt||0), 0); 
        
        let tP = bC + eC; 
        let tR = bR + eR;
        
        let tPay = 0; 
        document.querySelectorAll(`.pay-amt-${tid}`).forEach(inp => { 
            tPay += parseFloat(inp.value || 0); 
        }); 
        
        let isC = document.getElementById(`mstat-${tid}`).value === 'Cleared';
        
        if (type === 'Own Booking') {
            let bToP = tP - tPay - eR; 
            let el = document.getElementById(`dyn-bal-${tid}`);
            if (el) { 
                if (isC && bToP > 0) {
                    el.innerHTML = `<div style="color:#5f6368;"><del>Original Balance: ₹${bToP.toFixed(2)}</del></div><div style="color:#188c38; margin:6px 0;">Saved on deduction: ₹${bToP.toFixed(2)}</div><div>Final Balance to Pay: ₹0</div>`; 
                } else {
                    el.innerHTML = `Balance to Pay: ₹${bToP.toFixed(2)}`; 
                }
            }
        } else {
            let os = tR - tPay - eC; 
            let el = document.getElementById(`dyn-bal-${tid}`);
            if (el) { 
                if (isC && os > 0) {
                    el.innerHTML = `<div style="color:#5f6368;"><del>Original O/S: ₹${os.toFixed(2)}</del></div><div style="color:#d93025; margin:6px 0;">Bad Debts: ₹${os.toFixed(2)}</div><div>Final Outstanding: ₹0</div>`; 
                } else {
                    el.innerHTML = `Outstanding Amount: ₹${os.toFixed(2)}`; 
                }
            }
        }
    }

    function renderReconciliation() {
        const c = document.getElementById('reco-container'); 
        if(!currentRecoType) return;
        
        let trips = getFilteredTrips(allTrips).filter(t => t.computedBookingType === currentRecoType).filter(t => { 
            let l = { reco: {} }; 
            try { 
                let p = JSON.parse(t.financialLedger); 
                if(p.reco) l.reco=p.reco; 
            } catch(e){} 
            return (currentRecoStat === "Completed") ? (l.reco.status || "Pending") === "Cleared" : (l.reco.status || "Pending") !== "Cleared"; 
        });
        
        if (trips.length === 0) { 
            c.innerHTML = "<p style='padding:20px; text-align:center;'>No ledger records matching parameters.</p>"; 
            return; 
        }
        
        const pAuth = getUserPerms(); 
        const ce = pAuth.editPayments; 
        const cvf = pAuth.viewBaseFreight;

        c.innerHTML = trips.map((t, i) => {
            let l = { income: [], expense: [], reco: { payments: [] } }; 
            try { 
                let p = JSON.parse(t.financialLedger); 
                if(p.income) l.income = p.income; 
                if(p.expense) l.expense = p.expense; 
                if(p.reco) l.reco = p.reco; 
                if(!l.reco.payments) l.reco.payments = []; 
            } catch(e){}
            
            if (!l.reco.payments) l.reco.payments = [];
            
            if (l.reco.payments.length === 0) {
                if (currentRecoType === 'Own Booking') { 
                    if (l.reco.advPaid || l.reco.balPaid1 || l.reco.balPaid2 || l.reco.balPaid3) { 
                        if(l.reco.advPaid) l.reco.payments.push({amt: l.reco.advPaid, date: l.reco.advDate}); 
                        if(l.reco.balPaid1 || l.reco.balPaid) l.reco.payments.push({amt: l.reco.balPaid1 || l.reco.balPaid, date: l.reco.balDate1 || l.reco.balDate}); 
                        if(l.reco.balPaid2) l.reco.payments.push({amt: l.reco.balPaid2, date: l.reco.balDate2}); 
                        if(l.reco.balPaid3) l.reco.payments.push({amt: l.reco.balPaid3, date: l.reco.balDate3}); 
                    } 
                } else { 
                    if (l.reco.advRec || l.reco.osDues1 || l.reco.osDues2 || l.reco.osDues3) { 
                        if(l.reco.advRec) l.reco.payments.push({amt: l.reco.advRec, date: l.reco.advRecDate}); 
                        if(l.reco.osDues1 || l.reco.osDues) l.reco.payments.push({amt: l.reco.osDues1 || l.reco.osDues, date: l.reco.osDate1 || l.reco.osDate}); 
                        if(l.reco.osDues2) l.reco.payments.push({amt: l.reco.osDues2, date: l.reco.osDate2}); 
                        if(l.reco.osDues3) l.reco.payments.push({amt: l.reco.osDues3, date: l.reco.osDate3}); 
                    } 
                }
            }
            if (l.reco.payments.length === 0) l.reco.payments.push({amt:"", date:""});
            
            if (l.expense.length === 0 && (t.otherExp || t.loadingExp || t.unloadingExp || t.lrExp)) { 
                if(t.otherExp) l.expense.push({type: t.otherExpReason || 'Generic', amt: parseFloat(t.otherExp)}); 
                if(t.loadingExp) l.expense.push({type: 'Loading', amt: parseFloat(t.loadingExp)}); 
                if(t.unloadingExp) l.expense.push({type: 'Unloading', amt: parseFloat(t.unloadingExp)}); 
                if(t.lrExp) l.expense.push({type: 'LR', amt: parseFloat(t.lrExp)}); 
            }
            
            let bR = parseFloat(t.cFreight || 0); 
            let eR = l.income.reduce((s, r) => s + parseFloat(r.amt||0), 0); 
            let bC = parseFloat(t.vFreight || 0); 
            let eC = l.expense.reduce((s, r) => s + parseFloat(r.amt||0), 0); 
            let tP = bC + eC; 
            let tR = bR + eR;
            
            let brAgt = t.brokingAgent; 
            if (!brAgt) { 
                try { 
                    let p = JSON.parse(t.financialLedger); 
                    if(p.brokingAgent) brAgt = p.brokingAgent; 
                } catch(e){} 
            }
            
            let hdr = `<strong>${(t.date||'').split(',')[0]}</strong> | <strong>${t.vNum}</strong> | ${t.from}➔${t.to} <br> <span style="color:#5f6368; font-size:11px;">Party: ${t.party || 'N/A'} | ${currentRecoType==='Own Booking'?'Transporter':'Broker'}: ${currentRecoType==='Own Booking'?t.tName:brAgt}</span>`;
            let oC = (currentOpenRecoId === t.id) ? 'open' : ''; 
            let isC = (l.reco.status === "Cleared"); 
            let h = ""; 
            let ptTot = l.reco.payments.reduce((s, x)=> s + parseFloat(x.amt||0), 0);
            
            let amtRem = currentRecoType === 'Own Booking' ? (tP - ptTot - eR) : (tR - tP - ptTot); 
            let dH = "";
            
            if (isC && amtRem > 0) dH = `<del style="color:#8e8e8e; margin-right:4px;">₹${amtRem.toFixed(2)}</del> ₹0`; 
            else dH = `₹${amtRem.toFixed(2)}`;
            
            h += `
            <div class="reco-accordion-header" onclick="toggleRecoCard('${t.id}')">
                <div class="reco-info-col">${hdr}</div>
                <div class="reco-amt-col">
                    <div class="far-right-amt">${dH}</div>
                    <div style="color:#1a73e8;">▼</div>
                </div>
            </div>
            <div id="reco-body-${t.id}" class="reco-accordion-body ${oC}">
                <div class="reco-split-grid">
                    <div class="reco-panel">
                        <div class="reco-header-title">Receivables</div>`;
                        
            if (cvf || currentRecoType !== 'Own Booking') { 
                h += `
                        <div class="calc-row"><span>Base Freight:</span> <span>₹${bR}</span></div>
                        <div style="max-height:120px; overflow-y:auto; overflow-x:hidden; padding-right:4px;">${l.income.map(x=>`<div class="calc-line-item"><span>${x.type}:</span> <span>₹${x.amt}</span></div>`).join('')}</div>
                        <div class="calc-gross"><span>Total Receivable:</span> <span>₹${tR}</span></div>`; 
            } else { 
                h += `
                        <div class="calc-row"><span>Base Freight:</span> <span style="color:#b3261e;">🔒 Restricted</span></div>
                        <div style="max-height:120px; overflow-y:auto; overflow-x:hidden; padding-right:4px;">${l.income.map(x=>`<div class="calc-line-item"><span>${x.type}:</span> <span>₹${x.amt}</span></div>`).join('')}</div>
                        <div class="calc-gross"><span>Total Receivable:</span> <span style="color:#b3261e;">🔒 Restricted</span></div>`; 
            }
            
            h += `
                    </div>
                    <div class="reco-panel">
                        <div class="reco-header-title">Payables</div>
                        <div class="calc-row"><span>Base Cost:</span> <span>₹${bC}</span></div>
                        <div style="max-height:120px; overflow-y:auto; overflow-x:hidden; padding-right:4px;">${l.expense.map(x=>`<div class="calc-line-item"><span>${x.type}:</span> <span>₹${x.amt}</span></div>`).join('')}</div>
                        <div class="calc-gross"><span>Total Payable:</span> <span>₹${tP}</span></div>`;
                        
            if (ce) {
                h += `
                        <div style="margin-top:10px;">
                            <label>${currentRecoType==='Own Booking'?'Payments Processed':'Dues Received'}</label>
                            <div id="payment-slots-${t.id}">`;
                            
                l.reco.payments.forEach((p, idx) => { 
                    let pld = (currentRecoType==='Own Booking') ? (idx===0 ? 'Advance Paid' : 'Balance Paid') : (idx===0 ? 'Advance Recv' : 'O/s Dues'); 
                    h += `
                                <div class="payment-slot-row">
                                    <input type="number" class="compact-input pay-amt-${t.id}" placeholder="${pld}" value="${p.amt||''}" oninput="calcRecoUI('${t.id}', '${currentRecoType}')">

    function commitRecoRecord(id, mode) {
        let t = allTrips.find(x => x.id === id); 
        if(!t) return;
        
        let l = { income: [], expense: [], reco: { payments: [] } }; 
        try { 
            let p = JSON.parse(t.financialLedger); 
            if(p) Object.assign(l, p); 
            if(!l.reco) l.reco={payments:[]}; 
        } catch(e){}
        
        l.reco.status = document.getElementById(`mstat-${id}`).value; 
        l.reco.remarks = document.getElementById(`reco-remarks-${id}`) ? document.getElementById(`reco-remarks-${id}`).value : '';
        if (document.getElementById(`reco-bank-${id}`)) l.reco.bankAc = document.getElementById(`reco-bank-${id}`).value; 
        if (document.getElementById(`reco-ifsc-${id}`)) l.reco.ifsc = document.getElementById(`reco-ifsc-${id}`).value;
        
        let amtInps = document.querySelectorAll(`.pay-amt-${id}`); 
        let dtInps = document.querySelectorAll(`.pay-date-${id}`); 
        l.reco.payments = [];
        
        for(let i=0; i<amtInps.length; i++) { 
            if(amtInps[i].value || dtInps[i].value) l.reco.payments.push({amt: amtInps[i].value, date: dtInps[i].value}); 
        }
        
        const jsonStr = JSON.stringify(l); 
        t.financialLedger = jsonStr; 
        fetch(GOOGLE_SCRIPT_URL+"?t="+Date.now(), { method: 'POST', body: JSON.stringify({ action: 'updateFinancialLedger', id: id, ledgerJson: jsonStr }) }); 
        
        alert("Ledger updated globally."); 
        renderReconciliation(); 
    }

    function generateCustomReport() {
        try {
            const pName = document.getElementById('rf-party').value.trim().toLowerCase(); 
            let f = getFilteredTrips(allTrips).filter(t => t.computedBookingType === currentReportType); 
            
            if (pName) f = f.filter(t => (t.party || '').toLowerCase().includes(pName));
            
            const ts = document.getElementById('report-trip-status').value; 
            const ps = document.getElementById('report-pod-status').value;
            
            let finalF = []; 
            const ydy = new Date(); 
            ydy.setDate(ydy.getDate() - 1); 
            ydy.setHours(0,0,0,0);
            
            f.forEach(t => { 
                let st = (t.status || '').trim(); 
                if (st === 'In-Transit') { 
                    finalF.push(t); 
                } else if (st === 'Delivered' && t.deliveryDate) { 
                    let pd = parseDate(t.deliveryDate); 
                    if (pd > 0 && pd >= ydy.getTime()) finalF.push(t); 
                } 
            });
            
            if (ts !== 'All') finalF = finalF.filter(t => (t.status || '').trim() === ts);
            
            if (ps !== 'All') { 
                if (ps === 'Pending') finalF = finalF.filter(t => !t.podDate || String(t.podDate).trim() === ''); 
                if (ps === 'Received') finalF = finalF.filter(t => t.podDate && String(t.podDate).trim() !== ''); 
            }
            
            const sC = document.getElementById('screen-report'); 
            const pC = document.getElementById('print-report-container'); 
            document.getElementById('report-actions').style.display = 'flex';
            
            if (finalF.length === 0) { 
                sC.innerHTML = `<div style="text-align:center; padding:20px;">No records match.</div>`; 
                pC.innerHTML = ``; 
                return; 
            }
            
            let sHtml = `<table class="report-table"><thead><tr><th>Sr. No.</th><th>Booking Date</th><th>Delivery Date</th><th>Vehicle No. & Specs</th><th>Party Name</th><th>Route</th><th>Status</th><th>Location</th></tr></thead><tbody>`;
            finalF.forEach((t, i) => { 
                let st = (t.status || '').trim() === 'Delivered' ? `Delivered` : ((t.status || '').trim() === 'Cancelled Trip' ? `Cancelled` : `In-Transit`); 
                sHtml += `<tr><td>${i+1}</td><td>${(t.date || '').split(',')[0]}</td><td>${t.deliveryDate || 'Pending'}</td><td>${t.vNum} (${t.type||'-'}, ${t.weight||'-'})</td><td><strong>${t.party || ''}</strong></td><td>${t.from||'-'} to ${t.to||'-'}</td><td>${st}</td><td>${t.statusNote || '-'}</td></tr>`; 
            }); 
            sHtml += `</tbody></table>`; 
            
            sC.innerHTML = sHtml; 
            currentReportTrips = finalF;
        } catch(e) { 
            alert('Error generating report.'); 
        }
    }

    function triggerMISGeneration(misType) {
        const pName = document.getElementById('mis-party').value.trim(); 
        const bType = document.getElementById('mis-booking-type').value; 
        if(!pName) return alert("Party Name mandatory.");
        
        let eT = allTrips.filter(t => t.computedBookingType === bType && (t.party || '').toLowerCase() === pName.toLowerCase()); 
        if(eT.length === 0) return alert("No records found.");
        
        const wb = XLSX.utils.book_new(); 
        let grouped = {};
        
        eT.forEach(t => { 
            let mName = "Master"; 
            if(t.date && t.date.includes('/')) { 
                let pts = t.date.split('/'); 
                if(pts[1]) { 
                    const mos = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]; 
                    let idx = parseInt(pts[1]) - 1; 
                    if(mos[idx]) mName = mos[idx] + " " + pts[2]; 
                } 
            } 
            if(!grouped[mName]) grouped[mName] = []; 
            grouped[mName].push(t); 
        });
        
        for (let mK in grouped) { 
            let r = []; 
            r.push(["Sr. No.", "C-Note No.", "Booking Date", "Delivery Date", "TAT", "From", "To", "Qty", "Pkg Type", "Vehicle No.", "Vehicle Type", "Vehicle Capacity", "Remarks"]); 
            grouped[mK].forEach((t, i) => { 
                let tat = ""; 
                if(t.deliveryDate && t.date) { 
                    try { 
                        let p1 = t.date.split(',')[0].split('/'); 
                        let p2 = t.deliveryDate.split('/'); 
                        let d1 = new Date(p1[2], p1[1]-1, p1[0]); 
                        let d2 = new Date(p2[2], p2[1]-1, p2[0]); 
                        let diff = d2 - d1; 
                        if(diff >= 0) tat = Math.round(diff / 86400000) + " Days"; 
                    } catch(e){} 
                } 
                r.push([i+1, t.cNote || "-", (t.date || '').split(',')[0], t.deliveryDate || "-", tat, t.from, t.to, t.weight, t.type, t.vNum, t.type, t.weight, t.remarks || ""]); 
            }); 
            const ws = XLSX.utils.aoa_to_sheet(r); 
            ws['!views'] = [{ showGridLines: false }]; 
            XLSX.utils.book_append_sheet(wb, ws, mK); 
        }
        XLSX.writeFile(wb, `KTPL_${misType}_${pName}.xlsx`); 
        closeMISModal();
    }

    function triggerRecoExcelDownload(ledgerType) {
        let eT = getFilteredTrips(allTrips).filter(t => t.computedBookingType === ledgerType); 
        if(eT.length === 0) return alert("No data.");
        
        const wb = XLSX.utils.book_new(); 
        let r = [];
        
        if (ledgerType === 'Own Booking') {
            r.push(["Trip ID", "Date", "Party Name", "From", "To", "Vehicle No", "Type", "Weight", "Status", "Delivery Date", "Custom Note", "CNote_LR", "POD_Date", "Created By", "Vehicle Freight", "Charged Freight", "Driver Name", "Driver Contact", "Transporter", "Transporter Person", "Transporter Contact", "Remarks", "POD Remark", "Loading", "Unloading", "LR", "Others", "Other Reason", "Balance to Pay", "Saved on add. deduction"]);
            eT.forEach(t => { 
                let l = { income: [], expense: [], reco: {payments:[]} }; 
                try { 
                    let p = JSON.parse(t.financialLedger); 
                    if(p.income) l.income = p.income; 
                    if(p.expense) l.expense = p.expense; 
                    if(p.reco) l.reco = p.reco; 
                    if(!l.reco.payments) l.reco.payments=[]; 
                } catch(e){} 
                
                let bC = parseFloat(t.vFreight || 0); 
                let ld = l.expense.find(e=>e.type==='Loading'); let loading = ld ? ld.amt : 0; 
                let un = l.expense.find(e=>e.type==='Unloading'); let unloading = un ? un.amt : 0; 
                let oth = l.expense.filter(e=>e.type!=='Loading' && e.type!=='Unloading').reduce((s,x)=>s+parseFloat(x.amt||0),0); 
                let ptTot = l.reco.payments.reduce((s,x)=>s+parseFloat(x.amt||0),0); 
                
                if(!l.reco.payments || l.reco.payments.length===0) {
                    ptTot = parseFloat(l.reco.advPaid || t.advancePaid || 0) + parseFloat(l.reco.balPaid1 || l.reco.balPaid || 0) + parseFloat(l.reco.balPaid2 || 0) + parseFloat(l.reco.balPaid3 || 0); 
                }
                
                let tP = bC + (ld?parseFloat(ld.amt||0):0) + (un?parseFloat(un.amt||0):0) + oth; 
                let bToP = tP - ptTot - (l.income.reduce((s,r)=>s+parseFloat(r.amt||0),0)); 
                let isC = (l.reco.status === 'Cleared'); 
                let sDed = (isC && bToP > 0) ? bToP : 0; 
                let fB = (isC && bToP > 0) ? 0 : bToP; 
                let lr = l.expense.find(e=>e.type==='LR'); 
                
                r.push([t.id, t.date, t.party, t.from, t.to, t.vNum, t.type, t.weight, t.status, t.deliveryDate, t.statusNote||"", t.cNote||"", t.podDate||"", t.createdBy, t.vFreight, t.cFreight, t.dName, t.dContact, t.tName, t.tPerson, t.tContact, t.remarks, t.podRemark, loading, unloading, lr?lr.amt:0, oth, t.otherExpReason||"", fB, sDed]); 
            });
        } else {
            r.push(["Trip ID", "Date", "Party Name", "From", "To", "Vehicle No", "Type", "Weight", "Status", "Delivery Date", "Custom Note", "CNote_LR", "POD_Date", "Created By", "Vehicle Freight", "Charged Freight", "Driver Name", "Driver Contact", "Transporter", "Transporter Person", "Transporter Contact", "Remarks", "POD Remark", "Loading", "Unloading", "LR", "Others", "Other Reason", "Outstanding Amount", "Bad Debts"]);
            eT.forEach(t => { 
                let l = { income: [], expense: [], reco: {payments:[]} }; 
                try { 
                    let p = JSON.parse(t.financialLedger); 
                    if(p.reco) l.reco = p.reco; 
                    if(p.expense) l.expense = p.expense; 
                    if(p.income) l.income = p.income; 
                    if(!l.reco.payments) l.reco.payments=[]; 
                } catch(e){} 
                
                let bC = parseFloat(t.vFreight || 0); 
                let ptTot = l.reco.payments.reduce((s,x)=>s+parseFloat(x.amt||0),0); 
                
                if(!l.reco.payments || l.reco.payments.length===0) {
                    ptTot = parseFloat(l.reco.advRec || 0) + parseFloat(l.reco.osDues1 || l.reco.osDues || 0) + parseFloat(l.reco.osDues2 || 0) + parseFloat(l.reco.osDues3 || 0); 
                }
                
                let tOs = (parseFloat(t.cFreight || 0) + l.income.reduce((s,x)=>s+parseFloat(x.amt||0),0)) - (bC + l.expense.reduce((s,x)=>s+parseFloat(x.amt||0),0) + ptTot); 
                let bd = (l.reco.status === "Cleared" && tOs > 0) ? tOs : 0; 
                let fOs = (l.reco.status === "Cleared" && tOs > 0) ? 0 : tOs; 
                
                r.push([t.id, t.date, t.party, t.from, t.to, t.vNum, t.type, t.weight, t.status, t.deliveryDate, t.statusNote||"", t.cNote||"", t.podDate||"", t.createdBy, "", t.cFreight, "", "", "", "", "", t.remarks, t.podRemark, "", "", "", "", "", fOs, bd]); 
            });
        }
        
        const ws = XLSX.utils.aoa_to_sheet(r);

        XLSX.writeFile(wb, `KTPL_${ledgerType.replace(' ', '_')}_Ledger.xlsx`); 
        closeLedgerModal();
    }

        let st = (t.status || '').trim(); 
        if (st === 'Delivered') { sC = 'status-delivered'; st = `Delivered: ${t.deliveryDate}`; } 
        if (st === 'Cancelled Trip') { sC = 'status-cancelled'; st = `Cancelled`; }
        
        let cE = p.editTrips; 
        if (isA && !isMA && (st.includes('Delivered') || st.includes('Cancelled'))) cE = false;
        
        let h = `

            <div style="border-bottom: 1px solid #f1f3f4; padding-bottom: 8px; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center;">

    function renderPermissionsUI() { 
        const mods = ['Placement', 'Deployed', 'POD', 'Payments', 'Reports']; 
        let h = ''; 
        
        mods.forEach(m => { 
            h += `
            <div style="margin-bottom:10px; border:1px solid #dadce0; padding:10px; border-radius:8px; background:#f8f9fa;">
                <div style="font-weight:bold; cursor:pointer; font-size:13px; color:#0b57d0;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">▶ Manage Access: ${m}</div>
                <div style="display:none; margin-top:10px;">`; 
                
            users.filter(u => u.Name !== '__VCONFIG__' && u.name !== '__VCONFIG__').forEach(u => { 
                let chk = (u.permissions && u.permissions[m] === false) ? '' : 'checked'; 
                h += `
                    <div style="margin-bottom:4px; font-size:12px; color:#444746;">
                        <label style="margin:0; font-weight:normal; text-transform:none;">
                            <input type="checkbox" class="perm-cb" data-user="${u.Name||u.name}" data-mod="${m}" ${chk} style="width:auto; display:inline-block; margin-right:6px;"> ${u.Name||u.name}
                        </label>
                    </div>`; 
            }); 
            
            h += `</div></div>`; 
        }); 
        
        document.getElementById('module-access-container').innerHTML = h; 
    }

    function savePermissions() { 
        const cbs = document.querySelectorAll('.perm-cb'); 
        let nP = {}; 
        
        cbs.forEach(cb => { 
            let un = cb.getAttribute('data-user'); 
            let mod = cb.getAttribute('data-mod'); 
            if(!nP[un]) nP[un] = {}; 
            nP[un][mod] = cb.checked; 
        }); 
        
        users.forEach(u => { 
            let n = u.Name || u.name; 
            if(nP[n]) u.permissions = nP[n]; 
        }); 
        
        alert("Module access updated locally."); 
    }

    function saveUserManage() { 
        const on = document.getElementById('manage-user-old-name').value; 
        const nn = document.getElementById('manage-user-name').value.trim(); 
        const pin = document.getElementById('manage-user-pin').value.trim(); 
        const role = document.getElementById('manage-user-role').value; 
        
        if (!nn || !pin) return alert("Required."); 
        
        if (on) { 
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateUser', oldName: on, newName: nn, pin: pin, role: role }) }); 
            let u = users.find(x => (x.Name || x.name) === on); 
            if(u) { u.Name = nn; u.name = nn; u.PIN = pin; u.pin = pin; u.Role = role; u.role = role; } 
        } else { 
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addUser', name: nn, pin: pin, role: role }) }); 
            users.push({ Name: nn, name: nn, PIN: pin, pin: pin, Role: role, role: role }); 
        } 
        
        renderAdminUsers(); 
        closeUserModal(); 
    }

    function deleteUser(n) { 
        if (!confirm(`Delete access for ${n}?`)) return; 
        
        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteUser', name: n }) }); 
        users = users.filter(u => (u.Name || u.name) !== n); 
        renderAdminUsers(); 
    }

    function updateBackendData(tId, act, val) { 
        const p = { action: act, id: tId }; 
        if (act === 'updateCNote') p.value = val; 
        if (act === 'updatePODRemark') p.value = val; 
        if (act === 'updateTripRemark') p.value = val; 
        if (act === 'updatePOD') p.date = val; 
        
        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) }); 
        
        const t = allTrips.find(x => x.id === tId); 
        if (t) { 
            if (act === 'updateCNote') t.cNote = val; 
            if (act === 'updatePODRemark') t.podRemark = val; 
            if (act === 'updateTripRemark') t.remarks = val; 
            if (act === 'updatePOD') t.podDate = val; 
        } 
        if (act === 'updatePOD') triggerCurrentRender(); 
    }

    function savePOD(tId, clr = false) { 
        let fd = ""; 
        if (clr) { 
            if(!confirm("Remove POD Date?")) return; 
        } else { 
            const d = document.getElementById(`pod-date-${tId}`).value; 
            const r = currentUser.Role || currentUser.role; 
            const isA = (r === 'Admin' || r === 'Master Admin'); 
            
            if (!d) { 
                if (!isA || !confirm("Save without date?")) return alert("Select POD date."); 
                fd = "No Date"; 
            } else { 
                fd = getFormattedDateVal(d); 
            } 
        } 
        updateBackendData(tId, 'updatePOD', fd); 
    }

    }

    function toggleHistory(tId, vMode) { 
        document.querySelectorAll('.history-panel').forEach(p => { if (p.id !== `hist-${vMode}-${tId}`) p.style.display = 'none'; }); 
        const p = document.getElementById(`hist-${vMode}-${tId}`); 
        const ls = statusLogs.filter(l => String(l.tripId) === String(tId)); 
        
        if (ls.length === 0) { 
            p.innerHTML = "<div class='history-item'>No history found.</div>"; 
        } else { 
            p.innerHTML = ls.map(l => { 
                const d = new Date(l.time); 
                return `<div class="history-item"><strong>${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${d.getMinutes() < 10 ? '0':''}${d.getMinutes()}</strong> - ${l.note}</div>`; 
            }).join(''); 
        } 
        p.style.display = p.style.display === 'block' ? 'none' : 'block'; 
    }
    
    function openFinancialAllocation(tId) { 
        const t = allTrips.find(x => x.id === tId); 
        if(!t) return; 
        
        document.getElementById('fin-trip-id').value = tId; 
        document.getElementById('income-rows-container').innerHTML = ""; 
        document.getElementById('expense-rows-container').innerHTML = ""; 
        
        let l = { income: [], expense: [] }; 
        try { 
            let p = JSON.parse(t.financialLedger); 
            if(p.income) l.income = p.income; 
            if(p.expense) l.expense = p.expense; 
        } catch(e){} 
        
        if((l.expense || []).length === 0 && (t.otherExp || t.loadingExp || t.unloadingExp || t.lrExp)) { 
            if(t.otherExp) l.expense.push({type: t.otherExpReason || 'Generic', amt: parseFloat(t.otherExp)}); 
            if(t.loadingExp) l.expense.push({type: 'Loading', amt: parseFloat(t.loadingExp)}); 
            if(t.unloadingExp) l.expense.push({type: 'Unloading', amt: parseFloat(t.unloadingExp)}); 
            if(t.lrExp) l.expense.push({type: 'LR', amt: parseFloat(t.lrExp)}); 
        } 
        
        (l.income || []).forEach(r => addFinancialRow('income', r.type, r.amt)); 
        (l.expense || []).forEach(r => addFinancialRow('expense', r.type, r.amt)); 
        document.getElementById('financialModal').style.display = "flex"; 
    }

    function addFinancialRow(cat, t = "", a = "") { 
        const c = document.getElementById(`${cat}-rows-container`); 
        const r = document.createElement('div'); 
        r.className = "financial-row"; 
        r.innerHTML = `<input type="text" placeholder="Desc/Type" class="compact-input fin-desc" value="${t}"><input type="number" placeholder="Amount" class="compact-input fin-amt" value="${a}"><button class="btn btn-clear" onclick="this.parentElement.remove()" style="padding:10px; font-weight:bold; color:#b3261e; width:auto; border-radius:8px;">X</button>`; 
        c.appendChild(r); 
    }

        document.getElementById('financialModal').style.display = "none"; 
    }

    function saveFinancialLedger() { 
        const tId = document.getElementById('fin-trip-id').value; 
        const t = allTrips.find(x => x.id === tId); 
        
        let l = { income: [], expense: [], reco: {} }; 
        try { 
            let p = JSON.parse(t.financialLedger); 
            if(p) Object.assign(l, p); 
            l.income=[]; 
            l.expense=[]; 
        } catch(e){} 
        
        document.querySelectorAll('#income-rows-container .financial-row').forEach(r => { 
            let d = r.querySelector('.fin-desc').value; 
            let a = r.querySelector('.fin-amt').value; 
            if(d && a) l.income.push({ type: d, amt: parseFloat(a) }); 
        }); 
        
        document.querySelectorAll('#expense-rows-container .financial-row').forEach(r => { 
            let d = r.querySelector('.fin-desc').value; 
            let a = r.querySelector('.fin-amt').value; 
            if(d && a) l.expense.push({ type: d, amt: parseFloat(a) }); 
        }); 
        
        const js = JSON.stringify(l); 
        t.financialLedger = js; 
        fetch(GOOGLE_SCRIPT_URL+"?t="+Date.now(), { method: 'POST', body: JSON.stringify({ action: 'updateFinancialLedger', id: tId, ledgerJson: js }) }); 
        
        closeFinancialModal(); 
        triggerCurrentRender(); 
    }
    
    function openShareModal(tId) { 
        const t = allTrips.find(x => x.id === tId); 
        if (!t) return; 
        document.getElementById('share-modal-trip-id').value = tId; 
        document.getElementById('shareModal').style.display = "flex"; 
    }

    function closeShareModal() { 
        document.getElementById('shareModal').style.display = "none"; 
    }

    function executeDeployedShare(type) { 
        const tId = document.getElementById('share-modal-trip-id').value; 
        const t = allTrips.find(x => x.id === tId); 
        if (!t) return; 
        
        let bt = t.computedBookingType; 
        let h = `*${bt === 'Reverse Logistics' ? 'Reverse Logistics*\n*' : ''}Placement Details - ${t.vNum} - ${formatCaseStr(t.from)} to ${formatCaseStr(t.to)} - ${t.type} - ${t.weight}*\n\n`; 
        h += `*Date:* ${(t.date||'').split(',')[0]}\n\n`; 
        h += `*Party:* ${t.party || 'N/A'}\n\n`; 
        h += `*From:* ${formatCaseStr(t.from)}\n*To:* ${formatCaseStr(t.to)}\n\n`; 
        h += `*Veh No:* ${t.vNum}\n*Type:* ${t.type}\n*Weight:* ${t.weight}\n\n`; 
        
        if (bt === 'Reverse Logistics') { 
            h += `*Agency:* ${t.brokingAgent}\n`; 
            if(t.tPerson) h += `*Agent Name:* ${t.tPerson}\n`; 
            if(t.tContact) h += `*Contact No:* ${t.tContact}\n\n`; 
        } else { 
            if(t.dName) h += `*Driver:* ${t.dName}\n`; 
            if(t.dContact) h += `*Contact:* ${t.dContact}\n\n`; 
        } 
        
        if (type === 'team' && bt === 'Own Booking') { 
            if(t.tName) h += `*Transporter:* ${t.tName}\n`; 
            if(t.tPerson) h += `*Person:* ${t.tPerson}\n`; 
            if(t.tContact) h += `*Contact:* ${t.tContact}\n\n`; 
        } 
        
        if (t.remarks) h += `*Remarks:* ${t.remarks}`; 
        openWhatsAppChoice(h); 
    }
</script>
